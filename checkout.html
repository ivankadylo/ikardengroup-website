<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objednávka - IKarden</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }
        
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }
        
        .checkout-section {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
        }
        
        .section-title {
            color: #4ade80;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cccccc;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background-color: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 5px;
            color: #ffffff;
            font-size: 16px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4ade80;
        }
        
        .order-summary-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #3a3a3a;
        }
        
        .order-total {
            display: flex;
            justify-content: space-between;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }
        
        .submit-btn {
            width: 100%;
            margin-top: 20px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4ade80;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <a href="index.html" class="back-link">← Zpět na hlavní stránku</a>
        
        <h1 class="hero-title" style="text-align: center;">Dokončení objednávky</h1>
        
        <div class="checkout-grid">
            <!-- Order Form -->
            <div class="checkout-section">
                <h2 class="section-title">Vaše údaje</h2>
                <form id="orderForm">
                    <div class="form-group">
                        <label for="firstName">Jméno *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Příjmení *</label>
                        <input type="text" id="lastName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Telefon *</label>
                        <input type="tel" id="phone" required>
                    </div>
                    
                    <h2 class="section-title" style="margin-top: 30px;">Adresa</h2>
                    
                    <div class="form-group">
                        <label for="street">Ulice a číslo popisné *</label>
                        <input type="text" id="street" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="city">Město *</label>
                        <input type="text" id="city" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="zip">PSČ *</label>
                        <input type="text" id="zip" required>
                    </div>
                    
                    <h2 class="section-title" style="margin-top: 30px;">Způsob platby</h2>
                    
                    <div class="form-group">
                        <select id="payment" required>
                            <option value="">Vyberte způsob platby</option>
                            <option value="cash">Hotově při převzetí</option>
                            <option value="transfer">Bankovní převod</option>
                            <option value="card">Kreditní karta</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary submit-btn">
                        Odeslat objednávku
                    </button>
                </form>
            </div>
            
            <!-- Order Summary -->
            <div class="checkout-section">
                <h2 class="section-title">Souhrn objednávky</h2>
                <div id="orderSummary">
                    <!-- Will be filled by JavaScript -->
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Load cart
        let cart = [];
        const savedCart = localStorage.getItem('ikarden-cart');
        if (savedCart) {
            cart = JSON.parse(savedCart);
        }
        
        // Render order summary
        function renderOrderSummary() {
            const summaryDiv = document.getElementById('orderSummary');
            
            if (cart.length === 0) {
                summaryDiv.innerHTML = '<p style="text-align: center; color: #cccccc;">Košík je prázdný</p>';
                return;
            }
            
            const itemsHTML = cart.map(item => `
                <div class="order-summary-item">
                    <div>
                        <div>${item.name}</div>
                        <div style="color: #cccccc; font-size: 14px;">${item.quantity}x ${item.price.toLocaleString()} Kč</div>
                    </div>
                    <div style="font-weight: bold;">
                        ${(item.price * item.quantity).toLocaleString()} Kč
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            summaryDiv.innerHTML = `
                ${itemsHTML}
                <div class="order-total">
                    <span>Celkem:</span>
                    <span>${total.toLocaleString()} Kč</span>
                </div>
            `;
        }
        
        // Odeslání formuláře — přes EmailJS
        
        // Render on load
        renderOrderSummary();
        
        // Redirect if cart is empty
        if (cart.length === 0) {
            setTimeout(() => {
                alert('Košík je prázdný. Přesměrování na hlavní stránku.');
                window.location.href = 'index.html';
            }, 1000);
        }
    </script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script>
(function(){
    emailjs.init('QVKRrPh46BLF8ro-5');
})();

// Переписуємо функцію відправки
document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (cart.length === 0) {
        alert('Košík je prázdný!');
        window.location.href = 'index.html';
        return;
    }

    const firstName = document.getElementById('firstName').value;
    const lastName  = document.getElementById('lastName').value;
    const email     = document.getElementById('email').value;
    const phone     = document.getElementById('phone').value;
    const street    = document.getElementById('street').value;
    const city      = document.getElementById('city').value;
    const zip       = document.getElementById('zip').value;
    const payment   = document.getElementById('payment').value;
    const total     = cart.reduce((s,i) => s + i.price * i.quantity, 0);

    const itemsList = cart.map(i =>
        `• ${i.name} x${i.quantity} — ${(i.price*i.quantity).toLocaleString()} Kč`
    ).join('\n');

    const paymentNames = {
        cash: 'Наготові при отриманні',
        transfer: 'Банківський переказ',
        card: 'Кредитна картка'
    };

    const templateParams = {
        to_email:      'ikardengroup@gmail.com',
        from_name:     `${firstName} ${lastName}`,
        from_email:    email,
        phone:         phone,
        address:       `${street}, ${city}, ${zip}`,
        payment:       paymentNames[payment] || payment,
        items:         itemsList,
        total:         `${total.toLocaleString()} Kč`,
        order_date:    new Date().toLocaleString('uk-UA'),
    };

    // Показуємо кнопку завантаження
    const btn = document.querySelector('.submit-btn');
    btn.disabled = true;
    btn.textContent = 'Відправляємо...';

    try {
        await emailjs.send(
            'service_2hxrr9l',   // Service ID
            'template_0ekd5fd',   // Template ID
            templateParams
        );

        // Зберігаємо замовлення локально
        const orders = JSON.parse(localStorage.getItem('ikarden-orders') || '[]');
        orders.push({ ...templateParams, date: new Date().toISOString() });
        localStorage.setItem('ikarden-orders', JSON.stringify(orders));

        localStorage.removeItem('ikarden-cart');

        alert('✅ Děkujeme za objednávku! Potvrzovací e-mail byl odeslán.');
        window.location.href = 'index.html';

    } catch (err) {
        console.error('EmailJS error:', err);
        // Навіть якщо email не відправився — зберігаємо локально
        const orders = JSON.parse(localStorage.getItem('ikarden-orders') || '[]');
        orders.push({ ...templateParams, date: new Date().toISOString() });
        localStorage.setItem('ikarden-orders', JSON.stringify(orders));
        localStorage.removeItem('ikarden-cart');

        alert('Děkujeme za objednávku! Brzy vás budeme kontaktovat.');
        window.location.href = 'index.html';
    }
});
</script>
</body>
</html>
